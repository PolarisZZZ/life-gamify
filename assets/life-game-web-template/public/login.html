<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Life Game · 登录</title><link rel="stylesheet" href="__BASE_PATH__/style.css"></head><body class="login-body"><main class="login-card"><div class="sigil">✦</div><h1>Life Game</h1><p>Private gamified task system</p><form id="loginForm"><input name="username" placeholder="用户名（可选）" autocomplete="username"><input name="password" type="password" placeholder="密码" autocomplete="current-password"><div class="sep">或</div><input name="token" type="password" placeholder="验证 token"><button>进入系统</button><div id="msg" class="msg"></div></form></main><script>loginForm.onsubmit=async(e)=>{e.preventDefault();msg.textContent='验证中…';const data=Object.fromEntries(new FormData(loginForm));const r=await fetch('__BASE_PATH__/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(data)});if(r.ok) location.href='__BASE_PATH__/'; else msg.textContent='验证失败';}</script></body></html>
